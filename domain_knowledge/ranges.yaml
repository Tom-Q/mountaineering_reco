# Mountain ranges with bounding boxes for geographic filtering.
#
# Each entry has:
#   name:    canonical name
#   aliases: alternative names or spellings the agent might receive
#   bbox:    {lat_min, lat_max, lon_min, lon_max} in WGS84 decimal degrees
#
# Sub-ranges are separate entries with more precise bboxes.
# Where a route could belong to multiple entries (e.g. a Valais route
# matches both "Alps" and "Pennine Alps"), the more specific entry wins
# for filtering purposes — the agent should use the tightest applicable bbox.
#
# Ambiguous large ranges (Andes, Himalayas, Rockies) have both a coarse
# top-level entry and finer sub-range entries.

ranges:

  # ── EUROPE ────────────────────────────────────────────────────────────────

  - name: Alps
    aliases: [alpes, alpi, alpen]
    bbox: {lat_min: 43.5, lat_max: 48.5, lon_min: 5.0, lon_max: 17.0}

  - name: Western Alps
    aliases: [alpes occidentales, alpi occidentali]
    bbox: {lat_min: 43.5, lat_max: 46.5, lon_min: 5.0, lon_max: 8.0}

  - name: Mont Blanc massif
